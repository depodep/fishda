<!DOCTYPE html>
<html>
<head>
    <title>Calendar Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .event { padding: 10px; margin: 5px 0; border-radius: 5px; color: white; }
        .completed { background: #10b981; }
        .interrupted { background: #f97316; }
        .running { background: #3b82f6; }
        .scheduled { background: #6366f1; }
    </style>
</head>
<body>
    <h1>🧪 Calendar Data Visual Test</h1>
    
    <div id="debug"></div>
    <div id="events"></div>
    
    <script>
    async function testCalendar() {
        const debug = document.getElementById('debug');
        const events = document.getElementById('events');
        
        try {
            // Test the calendar API
            const response = await fetch('api/test_calendar.php');
            const data = await response.json();
            
            debug.innerHTML = `
                <h2>📊 API Response:</h2>
                <p><strong>Status:</strong> ${data.status}</p>
                <p><strong>Event Count:</strong> ${data.count || 0}</p>
                <pre>${JSON.stringify(data, null, 2)}</pre>
            `;
            
            if (data.data && data.data.length > 0) {
                events.innerHTML = '<h2>📅 Calendar Events:</h2>';
                
                data.data.forEach(event => {
                    const div = document.createElement('div');
                    div.className = 'event';
                    
                    if (event.backgroundColor === '#10b981') div.classList.add('completed');
                    else if (event.backgroundColor === '#f97316') div.classList.add('interrupted');
                    else if (event.backgroundColor === '#3b82f6') div.classList.add('running');
                    else div.classList.add('scheduled');
                    
                    div.innerHTML = `
                        <strong>${event.title}</strong><br>
                        📅 ${event.start}<br>
                        🆔 ${event.id}
                    `;
                    events.appendChild(div);
                });
            } else {
                events.innerHTML = '<h2>❌ No events found</h2>';
            }
            
        } catch (error) {
            debug.innerHTML = `<h2>❌ Error:</h2><p>${error.message}</p>`;
        }
    }
    
    testCalendar();
    </script>
    
    <p><a href="admin/users_dashboard.php">← Back to Dashboard</a></p>
</body>
</html>
